  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

iv style=\"position:relative;height:100vh;width:100%;overflow:hidden;background:#080b0a\">\n  <div style=\"position:absolute;top:-220px;right:-160px;width:620px;height:620px;border-radius:50%;background:radial-gradient(circle,rgba(52,224,138,0.16),transparent 65%);pointer-events:none;z-index:0;filter:blur(8px)\"><\u002Fdiv>\n  <div style=\"position:absolute;bottom:-260px;left:120px;width:680px;height:680px;border-radius:50%;background:radial-gradient(circle,rgba(40,180,120,0.10),transparent 68%);pointer-events:none;z-index:0;filter:blur(8px)\"><\u002Fdiv>\n\n  <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:fixed;inset:0;z-index:2147483647;background:#080b0a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px\">\n      <div style=\"width:38px;height:38px;border-radius:11px;background:#34e08a;display:flex;align-items:center;justify-content:center\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#06140c\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M12 5v14\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"width:24px;height:24px;border:2.5px solid rgba(255,255,255,0.12);border-top-color:#34e08a;border-radius:50%;animation:spin .7s linear infinite\"><\u002Fdiv>\n      <span style=\"color:#5e5e66;font-size:13px;letter-spacing:.3px\">Loading workspace…<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showLogin }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadein .25s ease\">\n      <div style=\"width:100%;max-width:404px;background:linear-gradient(160deg,#16191b,#0d1110);border:1px solid rgba(255,255,255,0.07);border-radius:22px;padding:30px 28px 26px;box-shadow:0 30px 80px rgba(0,0,0,0.55)\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:24px\">\n          <div style=\"width:34px;height:34px;border-radius:10px;background:#34e08a;display:flex;align-items:center;justify-content:center;flex:0 0 auto\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#06140c\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M12 5v14\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"line-height:1.1\"><div style=\"font-size:17px;font-weight:800;letter-spacing:-.3px;color:#f4f4f5\">Slate<\u002Fdiv><div style=\"font-size:10.5px;color:#5e5e66;font-weight:600;letter-spacing:.3px\">AFFILIATE OPS<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:21px;font-weight:800;color:#f6f6f7;letter-spacing:-.4px\">Sign in<\u002Fdiv>\n        <div style=\"font-size:13px;color:#7c7c84;margin-top:4px;margin-bottom:20px\">Use your team account to continue.<\u002Fdiv>\n        <form onsubmit=\"{{ doLogin }}\" novalidate=\"novalidate\" style=\"display:flex;flex-direction:column;gap:14px\">\n          <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:7px\">EMAIL<\u002Fdiv><input data-k=\"loginEmail\" value=\"{{ loginEmail }}\" oninput=\"{{ onLoginField }}\" type=\"text\" inputmode=\"email\" autocomplete=\"username\" placeholder=\"you@slate.team\" style=\"width:100%;height:42px;padding:0 13px;background:#0e0e11;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#ededf0;font-size:13.5px;outline:none\" style-focus=\"border-color:rgba(52,224,138,0.45)\"><\u002Fdiv>\n          <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:7px\">PASSWORD<\u002Fdiv><input data-k=\"loginPassword\" value=\"{{ loginPassword }}\" oninput=\"{{ onLoginField }}\" type=\"password\" placeholder=\"••••••••\" style=\"width:100%;height:42px;padding:0 13px;background:#0e0e11;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#ededf0;font-size:13.5px;out iv><div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:#f4f4f5;margin-top:9px\">{{ drill.lastRepost }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-size:13px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin:4px 2px 12px\">POSTED BY PLATFORM · {{ dailyDateLabel }}<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n      <sc-for list=\"{{ drill.platformGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n        <div style=\"background:linear-gradient(155deg,#16191b 0%,#0d1110 100%);border:1px solid rgba(255,255,255,0.06);border-radius:14px;overflow:hidden\">\n          <div style=\"display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05)\">\n            <span style=\"{{ g.badgeStyle }}\">{{ g.label }}<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:700;color:#ededf0\">{{ g.name }}<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#5e5e66\">{{ g.count }} posted<\u002Fspan>\n            <div style=\"flex:1\"><\u002Fdiv>\n            <sc-if value=\"{{ g.hasLink }}\" hint-placeholder-val=\"{{ false }}\"><a href=\"{{ g.link }}\" target=\"_blank\" style=\"display:flex;align-items:center;gap:4px;font-size:12px;color:#8b8b93;text-decoration:none;font-weight:600\" style-hover=\"color:#34e08a\">Open<svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M7 17 17 7\"><\u002Fpath><path d=\"M9 7h8v8\"><\u002Fpath><\u002Fsvg><\u002Fa><\u002Fsc-if>\n          <\u002Fdiv>\n          <sc-if value=\"{{ g.empty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:16px;color:#5e5e66;font-size:12.5px\">Nothing posted here yet today.<\u002Fdiv><\u002Fsc-if>\n          <sc-for list=\"{{ g.posts }}\" as=\"p\" hint-placeholder-count=\"0\">\n            <div style=\"displa n      <sc-if value=\"{{ isSlots }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Content Slots\" style=\"padding:20px 28px 44px;max-width:1560px\">\n  <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:16px\">\n    <div>\n      <div style=\"font-size:13px;color:#7fcfa3;font-weight:600\">Content plan<\u002Fdiv>\n      <div style=\"font-size:22px;font-weight:800;letter-spacing:-.4px;color:#f6f6f7;margin-top:2px\">Slot plan per character<\u002Fdiv>\n      <div style=\"font-size:13px;color:#7c7c84;margin-top:4px;max-width:660px\">Set how many videos each character needs and of what kind. This feeds the Dashboard to-do and pre-fills the Daily Builder — it stays as-is until you change it.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:9px;flex:0 0 auto;flex-wrap:wrap\">\n      <sc-if value=\"{{ slotAllClear }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 13px;border-radius:10px;font-size:12.5px;font-weight:700;color:#9affc9;background:rgba(52,224,138,0.1);border:1px solid rgba(52,224,138,0.26)\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>All slots met today<\u002Fspan><\u002Fsc-if>\n      <sc-if value=\"{{ slotHasOpen }}\" hint-placeholder-val=\"{{ true }}\">\n        <span style=\"display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 13px;border-radius:10px;font-size:12.5px;font-weight:700;color:#f0b341;background:rgba(240,179,65,0.1);border:1px solid rgba(240,179,65,0.26)\">{{ slotOpenCreate }} to create<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 13px;border-radius:10px;font-size:12.5px;font-weight:700;color:#5b8def;background:rgba(91,141,239,0.1);border:1px solid rgba(91,141,239,0.26)\">{{ slotOpenPost }} to post<\u002Fspan>\n      <\u002Fsc-if>\n      <button onclick=\"{{ slotGoBuilder }}\" style=\"display:flex;align-items:center;gap:6px;height:34px;padding:0 14px;background:#34e08a;color:#06140c;border:none;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer\" style-hover=\"background:#46e89a\">Open Daily Builder<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px\">\n    <sc-for list=\"{{ slotBoards }}\" as=\"b\" hint-placeholder-count=\"6\">\n      <div style=\"{{ b.boardStyle }}\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:13px\">\n          <span style=\"{{ b.avatarStyle }}\">{{ b.initial }}<\u002Fspan>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:#f4f4f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ b.character }}<\u002Fdiv>\n            <div style=\"font-size:11px;color:#6a6a72;margin-top:1px\">{{ b.product }}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"{{ b.countStyle }}\">{{ b.countLabel }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ b.canEdit }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;gap:7px;margin-bottom:11px\">\n          <sc-for list=\"{{ b.steppers }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <div style=\"{{ s.chipStyle }}\">\n              <span style=\"{{ s.dotStyle }}\"><\u002Fspan>\n              <span style=\"{{ s.labelStyle }}\">{{ s.prod }}<\u002Fspan>\n              <button onclick=\"{{ s.dec }}\" title=\"Remove one\" style=\"{{ s.decStyle }}\">−<\u002Fbutton>\n              <span style=\"{{ s.countStyle }}\">{{ s.count }}<\u002Fspan>\n              <button onclick=\"{{ s.inc }}\" title=\"Add one\" style=\"{{ s.incStyle }}\">+<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;flex-direction:column;gap:7px\">\n          <sc-for list=\"{{ b.slots }}\" as=\"it\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:9px;min-height:42px;padding:6px 10px;border-radius:11px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06)\">\n              <span style=\"{{ it.barStyle }}\"><\u002Fspan>\n              <span style=\"{{ it.numStyle }}\">{{ it.n }}<\u002Fspan>\n              <sc-if value=\"{{ b.canEdit }}\" hint-placeholder-val=\"{{ true }}\">\n                <select value=\"{{ it.prodValue }}\" onchange=\"{{ it.onProd }}\" style=\"{{ it.prodSelStyle }}\"><sc-for list=\"{{ slotProdOpts }}\" as=\"o\" hint-placeholder-count=\"3\"><option value=\"{{ o }}\">{{ o }}<\u002Foption><\u002Fsc-for><\u002Fselect>\n                <select value=\"{{ it.conceptValue }}\" onchange=\"{{ it.onConcept }}\" style=\"{{ it.conceptSelStyle }}\"><sc-for list=\"{{ conceptOpts }}\" as=\"o\" hint-placeholder-count=\"4\"><option value=\"{{ o.id }}\">{{ o.name }}<\u002Foption><\u002Fsc-for><\u002Fselect>\n                <button onclick=\"{{ it.remove }}\" title=\"Remove slot\" style=\"width:24px;height:24px;flex:0 0 auto;border:none;background:transparent;color:#7a7a82;cursor:pointer;font-size:14px\" style-hover=\"color:#f0584e\">✕<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ b.readonly }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"{{ it.prodChipStyle }}\">{{ it.prod }}<\u002Fspan>\n                <span style=\"flex:1;min-width:0;font-size:12px;color:#cfd0d4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ it.conceptName }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ b.noSlots }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:15px;text-align:center;font-size:12px;color:#5e5e66;border:1px dashed rgba(255,255,255,0.1);border-radius:11px\">No slots yet — use the steppers or Add slot.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ b.canEdit }}\" hint-placeholder-val=\"{{ true }}\">\n        <button onclick=\"{{ b.addSlot }}\" style=\"display:flex;align-items:center;justify-content:center;gap:6px;width:100%;height:34px;margin-top:9px;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.14);border-radius:10px;color:#9a9ba0;font-size:12px;font-weight:700;cursor:pointer\" style-hover=\"border-color:rgba(52,224,138,0.35);color:#34e08a\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14\"><\u002Fpath><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>Add slot<\u002Fbutton>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ b.hasPlan }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:13px;padding-top:13px;border-top:1px solid rgba(255,255,255,0.06)\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px;flex-wrap:wrap\">\n            <span style=\"font-size:11px;font-weight:700;color:#8b8b93\">Today<\u002Fspan>\n            <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n              <sc-if value=\"{{ b.allClear }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:8px;font-size:11px;font-weight:700;color:#9affc9;background:rgba(52,224,138,0.12);border:1px solid rgba(52,224,138,0.26)\">All met<\u002Fspan><\u002Fsc-if>\n              <sc-if value=\"{{ b.hasNeedCreate }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ b.createStyle }}\">{{ b.createLabel }}<\u002Fspan><\u002Fsc-if>\n              <sc-if value=\"{{ b.hasNeedPost }}\" hint-placehold e=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#8b8b93\">{{ s.n }} · {{ s.pctLabel }}<\u002Fspan><\u002Fdiv><div style=\"height:7px;border-radius:999px;background:rgba(255,255,255,0.05);overflow:hidden\"><div style=\"{{ s.barStyle }}\"><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px\">\n    <sc-for list=\"{{ varGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n      <div style=\"background:linear-gradient(155deg,#16191b 0%,#0d1110 100%);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px 18px\">\n        <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:12px\"><span style=\"{{ g.dotStyle }}\"><\u002Fspan><span style=\"font-size:13px;font-weight:700;color:#f4f4f5\">{{ g.title }} — most used<\u002Fspan><\u002Fdiv>\n        <sc-if value=\"{{ g.empty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:12px;color:#5e5e66;padding:8px 0\">No usage in this range yet.<\u002Fdiv><\u002Fsc-if>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ g.items }}\" as=\"v\" hint-placeholder-count=\"3\">\n            <div>\n              <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:5px\"><span style=\"display:inline-flex;align-items:center;height:16px;padding:0 5px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:#cfd0d4;background:rgba(255,255,255,0.06);flex:0 0 auto\">{{ v.label }}<\u002Fspan><span style=\"font-size:11.5px;color:#cfd0d4;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ v.text }}<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#8b8b93\">{{ v.n }}<\u002Fspan><\u002Fdiv>\n              <div style=\"height:6px;border-radius:999px;background:rgba(255,255,255,0.05);overflow:hidden;margin-left:0\"><div style=\"{{ v.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:10px;color:#5e5e66;margin-top:3px\">{{ v.concept }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fsc-if>\n      <sc-if value=\"{{ isLogs }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Logs\" style=\"padding:20px 28px 40px;max-width:920px\">\n  <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap\">\n    <div style=\"display:flex;gap:2px;background:linear-gradient(155deg,#17191b 0%,#0e1211 100%);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:3px\">\n      <sc-for list=\"{{ logFilters }}\" as=\"f\" hint-placeholder-count=\"4\"><div onclick=\"{{ f.onClick }}\" style=\"{{ f.style }}\">{{ f.label }}<\u002Fdiv><\u002Fsc-for>\n    <\u002Fdiv>\n    <span style=\"font-size:13px;color:#5e5e66\">{{ logCount }} entries<\u002Fspan>\n    <div style=\"flex:1\"><\u002Fdiv>\n    <div style=\"font-size:12px;color:#5e5e66;display:flex;align-items:center;gap:6px\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5e5e66\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>Posting detection is manual — automated capture can plug in later<\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-for list=\"{{ logGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n    <div style=\"margin-bottom:22px\">\n      <div style=\"font-size:11.5px;color:#6a6a72;font-weight:700;letter-spacing:.5px;margin-bottom:10px;padding-left:2px\">{{ g.label }}<\u002Fdiv>\n      <div style=\"position:relative;padding-left:8px\">\n        <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;align-items:flex-start;gap:13px;padding:11px 14px;background:linear-gradient(155deg,#15191a 0%,#0d1110 100%);border:1px solid rgba(255,255,255,0.05);border-radius:13px;margin-bottom:8px\">\n            <div style=\"{{ it.iconWrap }}\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ it.color }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{ it.icon }}\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"font-size:13px;color:#ededf0;line-height:1.4\">{{ it.title }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap\">\n                <sc-if value=\"{{ it.hasAccount }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#7c7c84\">{{ it.account }}<\u002Fspan><\u002Fsc-if>\n                <sc-for list=\"{{ it.chips }}\" as=\"c\" hint-placeholder-count=\"2\"><span style=\"{{ c.style }}\">{{ c.label }}<\u002Fspan><\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#5e5e66;flex:0 0 auto;white-space:nowrap\">{{ it.time }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n  <sc-if value=\"{{ logEmpty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:40px;text-align:center;color:#5e5e66;font-size:13px\">No entries match this filter.<\u002Fdiv><\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsc-if>\n      <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"padding:20px 28px 40px;max-width:980px;display:flex;flex-direction:column;gap:16px\">\n\n  <div style=\"background:linear-gradient(155deg,#16191b 0%,#0d1110 100%);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:18px 20px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\"><div><div style=\"font-size:15px;font-weight:700;color:#f4f4f5\">Products<\u002Fdiv><div style=\"font-size:12.5px;color:#5e5e66;margin-top:1px\">Promoted products — keeps the account form dropdown current<\u002Fdiv><\u002Fdiv>\n      <button onclick=\"{{ openAddProduct }}\" style=\"display:flex;align-items:center;gap:6px;height:34px;padding:0 13px;background:#1c1c21;border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:#ededf0;font-size:12.5px;font-weight:600;cursor:pointer\" style-hover=\"border-color:rgba(52,224,138,0.4)\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14\"><\u002Fpath><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>Add product<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:12px\">\n      <sc-for list=\"{{ products }}\" as=\"p\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:11px\">\n          <span style=\"width:9px;height:9px;border-radius:3px;background:{{ p.color }};flex:0 0 auto\"><\u002Fspan>\n          <div style=\"flex:1;min-width:0\"><div style=\"font-size:13.5px;font-weight:600;color:#f4f4f5\">{{ p.name }}<\u002Fdiv><div style=\"font-size:12px;color:#8b8b93;margin-top:2px;line-height:1.4\">{{ p.lane }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:linear-gradient(155deg,#16191b 0%,#0d1110 100%);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:18px 20px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between\"><div><div style=\"font-size:15px;font-weight:700;color:#f4f4f5\">Users &amp; access<\u002Fdiv><div style=\"font-size:12.5px;color:#5e5e66;margin-top:1px\">Set each person’s role and which accounts &amp; pages they manage<\u002Fdiv><\u002Fdiv>\n      <sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ openAddMember }}\" style=\"display:flex;align-items:center;gap:6px;height:34px;padding:0 13px;background:#1c1c21;border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:#ededf0;font-size:12.5px;font-weight:600;cursor:pointer\" style-hover=\"border-color:rgba(52,224,138,0.4)\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14\"><\u002Fpath><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>Add user<\u002Fbutton><\u002Fsc-if>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n      <sc-for list=\"{{ team }}\" as=\"m\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:12px;flex-wrap:wrap\">\n          <span style=\"{{ m.avatarStyle }}\">{{ m.initial }}<\u002Fspan>\n          <div style=\"flex:1;min-width:140px\"><div style=\"font-size:13.5px;font-weight:600;color:#f4f4f5\">{{ m.name }}<sc-if value=\"{{ m.isMe }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10.5px;color:#5e9c78;font-weight:700;margin-left:7px\">YOU<\u002Fspan><\u002Fsc-if><\u002Fdiv><div style=\"font-size:12px;color:#5e5e66\">{{ m.email }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#8b8b93;min-width:150px;text-align:right\">{{ m.access }}<\u002Fdiv>\n          <sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ true }}\">\n            <select onchange=\"{{ setRole }}\" data-id=\"{{ m.id }}\" value=\"{{ m.role }}\" style=\"height:32px;padding:0 10px;background:#1c1c21;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#ededf0;font-size:12.5px;font-weight:600;cursor:pointer;color-scheme:dark\"><option value=\"Admin\">Admin<\u002Foption><option value=\"Poster\">VA · Poster<\u002Foption><option value=\"Editor\">VA · Editor<\u002Foption><\u002Fselect>\n            <button onclick=\"{{ openEditMember }}\" data-id=\"{{ m.id }}\" title=\"Edit user\" style=\"width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#a1a1aa;cursor:pointer\" style-hover=\"border-color:rgba(52,224,138,0.4);color:#34e08a\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <sc-if value=\"{{ m.isEditor }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ openAccess }}\" data-id=\"{{ m.id }}\" style=\"display:flex;align-items:center;gap:5px;height:32px;padding:0 12px;background:rgba(52,224,138,0.1);border:1px solid rgba(52,224,138,0.26);border-radius:8px;color:#34e08a;font-size:12px;font-weight:700;cursor:pointer\" style-hover=\"background:rgba(52,224,138,0.18)\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z\"><\u002Fpath><path d=\"M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 6 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H.1a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 1.4 6\"><\u002Fpath><\u002Fsvg>Access<\u002Fbutton><\u002Fsc-if>\n            <button onclick=\"{{ resetMemberPassword }}\" data-id=\"{{ m.id }}\" title=\"Reset password\" style=\"width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#a1a1aa;cursor:pointer\" style-hover=\"border-color:rgba(52,224,138,0.4);color:#34e08a\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"11\" width=\"16\" height=\"9\" rx=\"2\"><\u002Frect><path d=\"M8 11V7a4 4 0 0 1 8 0v4\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <sc-if value=\"{{ m.isMe }}\" hint-placeholder-val=\"{{ false }}\"><\u002Fsc-if>\n            <sc-if value=\"{{ m.isVA }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ deleteMember }}\" data-id=\"{{ m.id }}\" title=\"Remove user\" style=\"width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#5e5e66;cursor:pointer\" style-hover=\"border-color:rgba(240,88,78,0.4);color:#f0584e\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M3 6h18\"><\u002Fpath><path d=\"M8 6V4h8v2\"><\u002Fpath><path d=\"M6 6l1 14h10l1-14\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fsc-if>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notAdmin }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"{{ m.roleStyle }}\">{{ m.roleName }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"background:linear-gradient(155deg,#16191b 0%,#0d1110 100%);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:18px 20px\">\n    <div style=\"font-size:15px;font-weight:700;color:#f4f4f5\">Account access — who manages each page<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#5e5e66;margin-top:1px;margin-bottom:14px\">Tick which VA editors manage each page — pick one or several. Posters always have access to every page, and admins see everything.<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:9px\">\n      <sc-for list=\"{{ accountAccess }}\" as=\"a\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;flex-direction:column;gap:11px;padding:13px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:13px\">\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <span style=\"{{ a.avatarStyle }}\">{{ a.initial }}<\u002Fspan>\n            <div style=\"flex:1;min-width:0\"><div style=\"font-size:13.5px;font-weight:600;color:#f4f4f5\">{{ a.name }}<\u002Fdiv><div style=\"font-size:11.5px;color:#5e5e66\">{{ a.product }}<\u002Fdiv><\u002Fdiv>\n            <span style=\"{{ a.countStyle }}\">{{ a.assignedCount }}<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ a.hasEditors }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n            <sc-for list=\"{{ a.editors }}\" as=\"m\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ m.toggle }}\" style=\"{{ m.style }}\"><span style=\"{{ m.checkStyle }}\">{{ m.check }}<\u002Fspan>{{ m.name }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ a.noEditors }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:12px;color:#5e5e66\">No VA editors yet — add one under Users &amp; access.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n    <div style=\"font-size:12.5px;color:#5e5e66;margin-top:1px;margin-bottom:14px\">Phase sets each account's daily target &amp; content ratio<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px\">\n      <sc-for list=\"{{ phases }}\" as=\"ph\" hint-placeholder-count=\"4\">\n        <div style=\"background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-top:3px solid {{ ph.color }};border-radius:11px;padding:14px\">\n          <div style=\"display:flex;align-items:center;gap:8px\"><span style=\"{{ ph.pillStyle }}\">{{ ph.code }}<\u002Fspan><span style=\"font-size:13px;font-weight:700;color:#f4f4f5\">{{ ph.title }}<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:11px;display:flex;flex-direction:column;gap:6px\">\n            <div style=\"display:flex;justify-content:space-between;font-size:12px\"><span style=\"color:#5e5e66\">Per day<\u002Fspan><span style=\"color:#ededf0;font-weight:600;font-family:'JetBrains Mono',monospace\">{{ ph.perDay }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:12px\"><span style=\"color:#5e5e66\">Ratio<\u002Fspan><span style=\"color:#ededf0;font-weight:600\">{{ ph.ratio }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;font-size:12px\"><span style=\"color:#5e5e66\">Reposts<\u002Fspan><span style=\"color:#ededf0;font-weight:600\">{{ ph.reposts }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-top:14px;padding:12px 14px;background:rgba(91,141,239,0.06);border:1px solid rgba(91,141,239,0.18);border-radius:11px;font-size:12.5px;color:#9bbdf5;line-height:1.5\"><span style=\"font-weight:700;color:#bcd3f8\">Principle:<\u002Fspan> phase is set by views, not age. Growth never drops to zero, and the ratio flips from growth-led to product-led around P2 → P3.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:linear-gradient(155deg,#16191b 0%,#0d1110 100%);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:18px 20px\">\n    <div style=\"font-size:15px;font-weight:700;color:#f4f4f5\">Data<\u002Fdiv>\n    <div style=\"font-size:12.5px;color:#5e5e66;margin-top:1px;margin-bottom:14px\">JSON backup — your data is portable and never trapped<\u002Fdiv>\n    <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n      <button onclick=\"{{ exportData }}\" style=\"display:flex;align-items:center;gap:7px;height:38px;padding:0 16px;background:#1c1c21;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#ededf0;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"border-color:rgba(52,224,138,0.4)\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12\"><\u002Fpath><path d=\"m7 10 5 5 5-5\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>Export JSON<\u002Fbutton>\n      <label style=\"display:flex;align-items:center;gap:7px;height:38px;padding:0 16px;background:#1c1c21;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#ededf0;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"border-color:rgba(52,224,138,0.4)\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 15V3\"><\u002Fpath><path d=\"m7 8 5-5 5 5\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>Import JSON<input type=\"file\" accept=\"application/json\" onchange=\"{{ importData }}\" style=\"display:none\"><\u002Flabel>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <button onclick=\"{{ clearContent }}\" style=\"display:flex;align-items:center;gap:7px;height:38px;padding:0 16px;background:transparent;border:1px solid rgba(240,88,78,0.3);border-radius:10px;color:#f0584e;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"background:rgba(240,88,78,0.1)\">Clear all content<\u002Fbutton>\n      <button onclick=\"{{ resetData }}\" style=\"display:flex;align-items:center;gap:7px;height:38px;padding:0 16px;background:transparent;border:1px solid rgba(240,88,78,0.3);border-radius:10px;color:#f0584e;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"background:rgba(240,88,78,0.1)\">Reset demo data<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fsc-if><\u002Fdiv>\n\n    <\u002Fmain><\u002Fdiv>\n  \n\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:48px 20px;overflow-y:auto\">\n    <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:540px;background:#141417;border:1px solid rgba(255,255,255,0.1);border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,0.5);overflow:hidden\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid rgba(255,255,255,0.06)\">\n        <div><div style=\"font-size:16px;font-weight:700;color:#f4f4f5\">{{ modalTitle }}<\u002Fdiv><sc-if value=\"{{ modalSubtitle }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#5e5e66;margin-top:2px\">{{ modalSubtitle }}<\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n        <button onclick=\"{{ closeModal }}\" style=\"width:32px;height:32px;border:none;background:rgba(255,255,255,0.05);border-radius:9px;color:#a1a1aa;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:rgba(255,255,255,0.1)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M18 6 6 18\"><\u002Fpath><path d=\"M6 6l12 12\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ modalIsLog }}\" hint-placeholder-val=\"{{ false }}\">\n      <form onsubmit=\"{{ logSubmit }}\" style=\"padding:20px 22px;display:flex;flex-direction:column;gap:16px;max-height:70vh;overflow-y:auto\">\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">TYPE<\u002Fdiv><div style=\"display:flex;gap:8px\"><sc-for list=\"{{ typeOptions }}\" as=\"o\" hint-placeholder-count=\"2\"><button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">CONCEPT<\u002Fdiv><select data-k=\"concept\" onchange=\"{{ onField }}\" value=\"{{ fConcept }}\" style=\"{{ fieldStyle }}\"><sc-for list=\"{{ conceptList }}\" as=\"c\" hint-placeholder-count=\"4\"><option value=\"{{ c.name }}\">{{ c.name }}<\u002Foption><\u002Fsc-for><\u002Fselect><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">PRODUCTION<\u002Fdiv><div style=\"display:flex;gap:8px\"><sc-for list=\"{{ prodOptions }}\" as=\"o\" hint-placeholder-count=\"3\"><button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">PLATFORMS · {{ platCount }} selected<\u002Fdiv><div style=\"display:flex;gap:7px;flex-wrap:wrap\"><sc-for list=\"{{ platOptions }}\" as=\"o\" hint-placeholder-count=\"2\"><button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:11px;padding:11px 13px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px\"><button type=\"button\" onclick=\"{{ toggleSplit }}\" style=\"{{ splitStyle }}\"><span style=\"{{ splitKnob }}\"><\u002Fspan><\u002Fbutton><div style=\"line-height:1.3\"><div style=\"font-size:12.5px;font-weight:600;color:#ededf0\">Split into separate posts per platform<\u002Fdiv><div style=\"font-size:11.5px;color:#5e5e66\">Off = one post logged across all selected platforms<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <button type=\"submit\" style=\"{{ submitBtnStyle }}\">Log post<\u002Fbutton>\n      <\u002Fform>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ modalIsRepost }}\" hint-placeholder-val=\"{{ false }}\">\n      <form onsubmit=\"{{ repostSubmit }}\" style=\"padding:20px 22px;display:flex;flex-direction:column;gap:16px\">\n        <div style=\"font-size:13px;color:#9a9ba0;line-height:1.5\">Logs a repost, bumps this account's repost count, and stamps today as the last-reposted date.<\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">WHAT WAS REPOSTED <span style=\"color:#3a3a40;font-weight:500\">(optional)<\u002Fspan><\u002Fdiv><input data-k=\"concept\" oninput=\"{{ onField }}\" value=\"{{ fConcept }}\" placeholder=\"e.g. Villain — fiber sludge\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">PLATFORMS<\u002Fdiv><div style=\"display:flex;gap:7px;flex-wrap:wrap\"><sc-for list=\"{{ platOptions }}\" as=\"o\" hint-placeholder-count=\"3\"><button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n        <button type=\"submit\" style=\"{{ submitBtnStyle }}\">Log repost<\u002Fbutton>\n      <\u002Fform>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ modalIsAccount }}\" hint-placeholder-val=\"{{ false }}\">\n      <form onsubmit=\"{{ submitAccount }}\" style=\"padding:20px 22px;display:flex;flex-direction:column;gap:16px;max-height:72vh;overflow-y:auto\">\n        <div style=\"display:flex;align-items:center;gap:14px\">\n          <div style=\"{{ avatarPreviewStyle }}\"><sc-if value=\"{{ avatarShow }}\" hint-placeholder-val=\"{{ true }}\">{{ avatarInitial }}<\u002Fsc-if><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:7px\">\n            <div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px\">PROFILE PICTURE<\u002Fdiv>\n            <div style=\"display:flex;gap:7px\">\n              <label style=\"display:flex;align-items:center;gap:6px;height:32px;padding:0 13px;background:#1c1c21;border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:#ededf0;font-size:12.5px;font-weight:600;cursor:pointer\" style-hover=\"border-color:rgba(52,224,138,0.32)\">Upload image<input type=\"file\" accept=\"image/*\" onchange=\"{{ onAvatarFile }}\" style=\"display:none\"><\u002Flabel>\n              <sc-if value=\"{{ hasAvatar }}\" hint-placeholder-val=\"{{ false }}\"><button type=\"button\" onclick=\"{{ clearAvatar }}\" style=\"height:32px;padding:0 13px;background:transparent;border:1px solid rgba(240,88,78,0.3);border-radius:9px;color:#f0584e;font-size:12.5px;font-weight:600;cursor:pointer\">Remove<\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">ACCOUNT NAME<\u002Fdiv><input data-k=\"name\" oninput=\"{{ onField }}\" value=\"{{ fName }}\" placeholder=\"e.g. marcus_remedies_2\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">PRODUCT<\u002Fdiv><div style=\"display:flex;gap:7px;flex-wrap:wrap\"><sc-for list=\"{{ productOptions }}\" as=\"o\" hint-placeholder-count=\"3\"><button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.name }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">FOLLOWERS<\u002Fdiv><input oninput=\"{{ onFollowers }}\" value=\"{{ fFollowers }}\" placeholder=\"e.g. 12500\" style=\"{{ fieldStyle }}\"><div style=\"font-size:11px;color:#5e5e66;margin-top:5px\">Sets phase automatically — <span style=\"color:#9bbdf5;font-weight:600\">{{ followerBand }}<\u002Fspan> followers. You can still override the phase below.<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:14px\"><div style=\"flex:1\"><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">PHASE<\u002Fdiv><div style=\"display:flex;gap:6px\"><sc-for list=\"{{ phaseOptions }}\" as=\"o\" hint-placeholder-count=\"4\"><button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">STATUS<\u002Fdiv><div style=\"display:flex;gap:6px\"><sc-for list=\"{{ statusOptions }}\" as=\"o\" hint-placeholder-count=\"4\"><button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">PLATFORM LINKS<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:8px\"><sc-for list=\"{{ platFields }}\" as=\"p\" hint-placeholder-count=\"2\"><div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:9px;height:9px;border-radius:3px;flex:0 0 auto;background:{{ p.color }}\"><\u002Fspan><span style=\"font-size:11.5px;color:#a1a1aa;width:78px;flex:0 0 auto;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.label }}<\u002Fspan><input oninput=\"{{ p.onInput }}\" value=\"{{ p.value }}\" placeholder=\"profile URL or handle\" style=\"{{ fieldStyle }}\"><sc-if value=\"{{ p.isCustom }}\" hint-placeholder-val=\"{{ false }}\"><button type=\"button\" onclick=\"{{ p.onRemove }}\" title=\"Remove this platform everywhere\" style=\"width:34px;height:38px;flex:0 0 auto;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#7a7a82;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"border-color:rgba(240,88,78,0.4);color:#f0584e\">✕<\u002Fbutton><\u002Fsc-if><\u002Fdiv><\u002Fsc-for><div style=\"display:flex;gap:7px;margin-top:2px\"><input value=\"{{ fNewPlat }}\" oninput=\"{{ onNewPlat }}\" onkeydown=\"{{ onNewPlatKey }}\" placeholder=\"Add a platform — e.g. TikTok, YouTube\" style=\"{{ fieldStyle }}\"><button type=\"button\" onclick=\"{{ addPlatform }}\" style=\"height:38px;padding:0 15px;flex:0 0 auto;background:rgba(52,224,138,0.12);border:1px solid rgba(52,224,138,0.3);border-radius:9px;color:#34e08a;font-size:12.5px;font-weight:700;cursor:pointer\" style-hover=\"background:rgba(52,224,138,0.2)\">Add<\u002Fbutton><\u002Fdiv><div style=\"font-size:11px;color:#5e5e66;line-height:1.45\">Platforms are shared across accounts — new ones appear in posting, the Daily Builder, analytics &amp; the dashboard.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">META BUSINESS SUITE LINK<\u002Fdiv><input data-k=\"meta\" oninput=\"{{ onField }}\" value=\"{{ fMeta }}\" placeholder=\"https://business.facebook.com/…\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">NOTES<\u002Fdiv><textarea data-k=\"notes\" oninput=\"{{ onField }}\" value=\"{{ fNotes }}\" rows=\"2\" placeholder=\"Anything the team should know\" style=\"{{ areaStyle }}\"><\u002Ftextarea><\u002Fdiv>\n        <div style=\"display:flex;gap:10px\"><sc-if value=\"{{ canDelete }}\" hint-placeholder-val=\"{{ false }}\"><button type=\"button\" onclick=\"{{ deleteAccount }}\" data-id=\"{{ editId }}\" style=\"height:42px;padding:0 16px;background:transparent;border:1px solid rgba(240,88,78,0.3);border-radius:10px;color:#f0584e;font-size:13px;font-weight:700;cursor:pointer\">Delete<\u002Fbutton><\u002Fsc-if><button type=\"submit\" style=\"{{ submitBtnStyle }}\">Save account<\u002Fbutton><\u002Fdiv>\n      <\u002Fform>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ modalIsConcept }}\" hint-placeholder-val=\"{{ false }}\">\n      <form onsubmit=\"{{ conceptSubmit }}\" style=\"padding:20px 22px;display:flex;flex-direction:column;gap:16px;max-height:72vh;overflow-y:auto\">\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">CONCEPT NAME<\u002Fdiv><input data-k=\"name\" oninput=\"{{ onField }}\" value=\"{{ fName }}\" placeholder=\"e.g. Myth-bust\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">ONE-LINE DESCRIPTION<\u002Fdiv><input data-k=\"tagline\" oninput=\"{{ onField }}\" value=\"{{ fTagline }}\" placeholder=\"What this concept is, in a sentence…\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">PRODUCT LANE<\u002Fdiv><div style=\"display:flex;gap:7px;flex-wrap:wrap\"><sc-for list=\"{{ laneOptions }}\" as=\"o\" hint-placeholder-count=\"3\"><button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.name }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:12px;color:#6a6a72;line-height:1.5\">After saving, add this concept’s variations, hooks &amp; bodies right on its card in the Concepts tab.<\u002Fdiv>\n        <button type=\"submit\" style=\"{{ submitBtnStyle }}\">Save concept<\u002Fbutton>\n      <\u002Fform>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ modalIsVariation }}\" hint-placeholder-val=\"{{ false }}\">\n      <form onsubmit=\"{{ variationSubmit }}\" style=\"padding:20px 22px;display:flex;flex-direction:column;gap:16px;max-height:74vh;overflow-y:auto\">\n        <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12.5px;color:#9a9ba0\">{{ varAxisTitle }} of <span style=\"color:#ededf0;font-weight:700\">{{ varConceptName }}<\u002Fspan><sc-if value=\"{{ varIsNew }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display:inline-flex;align-items:center;height:20px;padding:0 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;color:#9fbef7;background:rgba(91,141,239,0.14);border:1px solid rgba(91,141,239,0.28)\">{{ varNextLabel }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">{{ varFieldLabel }}<\u002Fdiv><textarea data-k=\"text\" oninput=\"{{ onField }}\" value=\"{{ fText }}\" rows=\"3\" placeholder=\"{{ varPlaceholder }}\" style=\"{{ areaStyle }}\"><\u002Ftextarea><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">STATUS<\u002Fdiv><div style=\"display:flex;gap:8px\"><sc-for list=\"{{ varStatusOptions }}\" as=\"o\" hint-placeholder-count=\"3\"><button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">EXAMPLE / REFERENCE LINK <span style=\"color:#3a3a40;font-weight:500\">(optional)<\u002Fspan><\u002Fdiv><input data-k=\"url\" oninput=\"{{ onField }}\" value=\"{{ fUrl }}\" placeholder=\"https://… reference video, doc, or Drive folder\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div style=\"font-size:12px;color:#6a6a72;line-height:1.5\">Tip: after saving, drop the playable example video and this variation’s hooks &amp; bodies right on its card in the Concepts tab.<\u002Fdiv>\n        <button type=\"submit\" style=\"{{ submitBtnStyle }}\">Save variation<\u002Fbutton>\n      <\u002Fform>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ modalIsProduct }}\" hint-placeholder-val=\"{{ false }}\">\n      <form onsubmit=\"{{ productSubmit }}\" style=\"padding:20px 22px;display:flex;flex-direction:column;gap:16px\">\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">PRODUCT NAME<\u002Fdiv><input data-k=\"name\" oninput=\"{{ onField }}\" value=\"{{ fName }}\" placeholder=\"Full product name\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">SHORT NAME<\u002Fdiv><input data-k=\"short\" oninput=\"{{ onField }}\" value=\"{{ fShort }}\" placeholder=\"Used in tables &amp; chips\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">LANE / MECHANISM<\u002Fdiv><input data-k=\"lane\" oninput=\"{{ onField }}\" value=\"{{ fLane }}\" placeholder=\"The locked mechanism\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">TARGETS / SYMPTOMS<\u002Fdiv><input data-k=\"symptoms\" oninput=\"{{ onField }}\" value=\"{{ fSymptoms }}\" placeholder=\"constipation, bloating…\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">POISON THE WELL<\u002Fdiv><input data-k=\"poison\" oninput=\"{{ onField }}\" value=\"{{ fPoison }}\" placeholder=\"what's wrong with the competition\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <button type=\"submit\" style=\"{{ submitBtnStyle }}\">Add product<\u002Fbutton>\n      <\u002Fform>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ modalIsMember }}\" hint-placeholder-val=\"{{ false }}\">\n      <form onsubmit=\"{{ memberSubmit }}\" style=\"padding:20px 22px;display:flex;flex-direction:column;gap:16px\">\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">NAME<\u002Fdiv><input data-k=\"name\" oninput=\"{{ onField }}\" value=\"{{ fName }}\" placeholder=\"Full name\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">EMAIL<\u002Fdiv><input data-k=\"email\" oninput=\"{{ onField }}\" value=\"{{ fEmail }}\" placeholder=\"name@team.com\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">PASSWORD<\u002Fdiv><input data-k=\"password\" oninput=\"{{ onField }}\" value=\"{{ fPassword }}\" placeholder=\"Temporary password\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <div><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">ROLE<\u002Fdiv><div style=\"display:flex;gap:8px\"><sc-for list=\"{{ roleOptions }}\" as=\"o\" hint-placeholder-count=\"2\"><button type=\"button\" onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv><div style=\"font-size:11.5px;color:#6a6a72;margin-top:8px;line-height:1.5\">Editors only make videos for assigned accounts. Posters post &amp; see all account data. Admins control everything.<\u002Fdiv><\u002Fdiv>\n        <button type=\"submit\" style=\"{{ submitBtnStyle }}\">{{ memberSubmitLabel }}<\u002Fbutton>\n      <\u002Fform>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ modalIsAccess }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding:18px 22px 22px;max-height:76vh;overflow-y:auto\">\n        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px\"><span style=\"{{ accessRoleStyle }}\">{{ accessRole }}<\u002Fspan><span style=\"font-size:13px;color:#9a9ba0\">{{ accessUserName }}<\u002Fspan><\u002Fdiv>\n        <sc-if value=\"{{ accessIsAdminUser }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:18px;text-align:center;font-size:13px;color:#7fcfa3;background:rgba(52,224,138,0.06);border:1px solid rgba(52,224,138,0.18);border-radius:12px\">Admins have full access to every account — no assignment needed.<\u002Fdiv><\u002Fsc-if>\n        <div style=\"font-size:12.5px;color:#6a6a72;line-height:1.5;margin:6px 0 14px\">Tick the accounts this person manages, then choose which pages (platforms) they’re responsible for. They’ll only see these.<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <sc-for list=\"{{ accessAccounts }}\" as=\"a\" hint-placeholder-count=\"6\">\n            <div style=\"{{ a.rowStyle }}\">\n              <div style=\"display:flex;align-items:center;gap:11px\">\n                <button onclick=\"{{ a.toggle }}\" style=\"{{ a.checkStyle }}\">{{ a.check }}<\u002Fbutton>\n                <span style=\"width:30px;height:30px;border-radius:9px;flex:0 0 auto;{{ a.avatarInset }}\"><sc-if value=\"{{ a.show }}\" hint-placeholder-val=\"{{ true }}\">{{ a.initial }}<\u002Fsc-if><\u002Fspan>\n                <div style=\"flex:1;min-width:0\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#ededf0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ a.name }}<\u002Fdiv><div style=\"font-size:11px;color:#6a6a72\">{{ a.product }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ a.assigned }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;flex-wrap:wrap;gap:6px;padding-left:33px\"><sc-for list=\"{{ a.plats }}\" as=\"p\" hint-placeholder-count=\"3\"><button onclick=\"{{ p.toggle }}\" title=\"{{ p.name }}\" style=\"{{ p.style }}\">{{ p.label }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeModal }}\" style=\"width:100%;height:42px;margin-top:16px;background:#34e08a;color:#06140c;border:none;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer\">Done<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ modalIsMetrics }}\" hint-placeholder-val=\"{{ false }}\">\n      <form onsubmit=\"{{ metricsSubmit }}\" style=\"padding:20px 22px;display:flex;flex-direction:column;gap:16px;max-height:74vh;overflow-y:auto\">\n        <div style=\"font-size:13px;color:#9a9ba0;line-height:1.5\">Enter the total clicks &amp; revenue for a day (across the whole operation). Pick any date to back-fill or edit a day you missed.<\u002Fdiv>\n        <div style=\"display:flex;gap:12px\">\n          <div style=\"flex:1\"><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">DATE<\u002Fdiv><input type=\"date\" data-k=\"date\" onchange=\"{{ onMetricDate }}\" value=\"{{ fDate }}\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px\">\n          <div style=\"flex:1\"><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">CLICKS<\u002Fdiv><input data-k=\"clicks\" oninput=\"{{ onField }}\" value=\"{{ fClicks }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">REVENUE ($)<\u002Fdiv><input data-k=\"revenue\" oninput=\"{{ onField }}\" value=\"{{ fRevenue }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin-bottom:8px\">SALES<\u002Fdiv><input data-k=\"sales\" oninput=\"{{ onField }}\" value=\"{{ fSales }}\" inputmode=\"numeric\" placeholder=\"0\" style=\"{{ fieldStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <button type=\"submit\" style=\"{{ submitBtnStyle }}\">Save numbers<\u002Fbutton>\n        <div>\n          <div style=\"font-size:11px;color:#5e5e66;font-weight:700;letter-spacing:.4px;margin:6px 0 9px\">RECENT DAYS · TAP TO EDIT<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:7px\">\n            <sc-for list=\"{{ recentDays }}\" as=\"r\" hint-placeholder-count=\"7\">\n              <div onclick=\"{{ r.onClick }}\" style=\"{{ r.style }}\">\n                <span style=\"font-size:12.5px;color:#ededf0;font-weight:600;flex:1\">{{ r.label }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#7fcfa3;width:70px;text-align:right\">{{ r.rev }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#8b8b93;width:60px;text-align:right\">{{ r.clk }} clk<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fform>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n  <\u002Fsc-if><\u002Fdiv>\n  \n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}\">\nclass Component extends DCLogic {\n  PHASE_TARGET = { P1: 3, P2: 5, P3: 6, P4: 9 };\n  DEFAULT_PLATFORMS = [{ id:'facebook', name:'Facebook', label:'FB', color:'#5b8def' }, { id:'instagram', name:'Instagram', label:'IG', color:'#e879b9' }];\n  PLAT_PALETTE = ['#9a7bff','#5bd5ef','#f0b341','#e879b9','#34e08a','#f0584e','#f97b5a','#6ee7b7'];\n  get platformDefs(){ const db=this.state&&this.state.db; const arr=(db&&Array.isArray(db.platforms)&&db.platforms.length)?db.platforms:this.DEFAULT_PLATFORMS; return arr; }\n  get PLATFORMS(){ return this.platformDefs.map(p=>p.id); }\n  get PLAT_LABEL(){ const m={}; this.platformDefs.forEach(p=>{ m[p.id]=p.label||p.name; }); return m; }\n  get PLAT_NAME(){ const m={}; this.platformDefs.forEach(p=>{ m[p.id]=p.name; }); return m; }\n  get PLAT_COLOR(){ const m={}; this.platformDefs.forEach(p=>{ m[p.id]=p.color||'#8b8b93'; }); return m; }\n  PROD_TIERS = ['Assembly','Scratch','Repost'];\n  C = { green:'#34e08a', amber:'#f0b341', red:'#f0584e', blue:'#5b8def', gray:'#8b8b93', violet:'#9a7bff', text:'#ededf0', muted:'#8b8b93' };\n  KEY = 'slate_crm_v2';\n  SKEY = 'slate_session_v1';\n\n  state = { tab:'dashboard', ready:false, db:null, date:null, role:null, userId:null, drillId:null, modal:null, search:'', acctTab:'all', detailId:null, detailPlatform:'facebook', libTab:'concepts', anTab:'accounts', conceptOpen:null, dashChart:'day', dashHover:null, profileMenu:false, loginEmail:'', loginPassword:'', loginError:null };\n\n  async componentDidMount(){\n    // Wait for the store bundle to finish loading before booting.\n    // (In a single-file bundle the component can mount before slate-store.js runs.)\n    for(let i=0; i<200 && !window.SlateStore; i++){ await new Promise(r=>setTimeout(r,25)); }\n    this.store = window.SlateStore ? window.SlateStore.create() : null;\n    const loaded = await Promise.resolve(this.load());\n    let db = loaded ? structuredClone(loaded) : this.seed();\n    db = this.migrate(db);\n    if(this.store) this.store.persist(loaded, db); // persist only the seed / migration diff\n    const T=this.todayStr();\n    const sid=await Promise.resolve(this.loadSession()); const u=sid&&(db.team||[]).find(t=>t.id===sid);\n    this.setState({ db, ready:true, date:T, plannerMonth:T.slice(0,7), selectedDate:T,\n      userId: u?u.id:null, role: u?u.role:null, tab: u?(u.role==='Admin'?'dashboard':(u.role==='Editor'?'builder':'mywork')):'dashboard' });\n    this._liveDb = db;\n    this._onBeforeUnload = ()=>this._flushPersist(); window.addEventListener('beforeunload', this._onBeforeUnload);\n    // Live sync: when any user changes anything on the server, refetch (debounced).\n    if(this.store && this.store.subscribe){ this._unsub = this.store.subscribe(()=>this.scheduleReload()); }\n    // Safety net: realtime can be disabled or flaky for individual tables, which\n    // makes another user's change (e.g. an editor ticking \"Video made\") only show\n    // up after a manual refresh. Poll the server on a short interval so everyone\n    // always converges. reloadFromStore() already defers while YOU are editing, so\n    // this never clobbers in-flight local work.\n    if(this.store && this.store.loadData){\n      this._pollT = setInterval(()=>{ if(document.visibilityState!=='hidden') this.scheduleReload(); }, 8000);\n      // Also pull immediately when the tab regains focus / becomes visible again.\n      this._onVisible = ()=>{ if(document.visibilityState==='visible') this.scheduleReload(); };\n      document.addEventListener('visibilitychange', this._onVisible);\n      window.addEventListener('focus', this._onVisible);\n    }\n  }\n  componentWillUnmount(){ this._flushPersist(); if(this._onBeforeUnload) window.removeEventListener('beforeunload', this._onBeforeUnload); if(this._unsub){ this._unsub(); } if(this._pollT) clearInterval(this._pollT); if(this._onVisible){ document.removeEventListener('visibilitychange', this._onVisible); window.removeEventListener('focus', this._onVisible); } clearTimeout(this._reloadT); clearTimeout(this._persistT); }\n  scheduleReload(){ clearTimeout(this._reloadT); this._reloadT=setTimeout(()=>this.reloadFromStore(), 400); }\n  async reloadFromStore(){ if(!this.store||!this.store.loadData) return;\n    // Never clobber in-flight local work: defer while a write is pending, an edit just happened, or a form is open.\n    if(this._persistT || this._persisting || this._flushNext || (this._localEditAt && (Date.now()-this._localEditAt)<1800) || this.state.modal){ return this.scheduleReload(); }\n    try{ const fresh=await Promise.resolve(this.store.loadData()); if(fresh){ const m=this.migrate(fresh); this._liveDb=m; this.setState({ db:m }); } }catch(e){ console.error('[app] live reload failed', e); } }\n  migrate(db){\n    if(!db.dailyMetrics){ db.dailyMetrics=this.seedMetrics(); }\n    (db.accounts||[]).forEach(a=>{ if(a.avatar===undefined) a.avatar=null; if(a.repostCount===undefined) a.repostCount=0; if(!Array.isArray(a.followersHistory)||!a.followersHistory.length){ a.followersHistory=this.seedFollowerHistory(a); } });\n    if(!db.characterMeta){ db.characterMeta=this.seedCharacterMeta(db); }\n    if(!Array.isArray(db.dailyEntries)){ db.dailyEntries=this.seedDailyEntries(db); }\n    (db.concepts||[]).forEach(c=>{ ['variations','hooks','bodies'].forEach(k=>{ if(!Array.isArray(c[k])) c[k]=[]; });\n      (c.hooks||[]).forEach(h=>{ if(h.video===undefined) h.video=''; if(h.videoKind===undefined) h.videoKind=''; }); });\n    (db.dailyEntries||[]).forEach(en=>{ ['conceptVarId','hookVarId','bodyVarId'].forEach(k=>{ if(en[k]===undefined) en[k]=''; });\n      if(en.type===undefined) en.type='Product'; if(en.prod===undefined) en.prod='Assembly'; if(en.videoLink===undefined) en.videoLink=''; if(en.posted===undefined) en.posted=false; if(!Array.isArray(en.platforms)) en.platforms=[]; if(en.postId===undefined) en.postId=null;\n      if(en.hookKind===undefined) en.hookKind='text'; if(en.hookLink===undefined) en.hookLink=''; if(!en.bodyKind) en.bodyKind='text'; if(en.bodyLink===undefined) en.bodyLink=''; if(en.refVideo===undefined) en.refVideo=''; if(en.win===undefined) en.win=false; if(en.wonAt===undefined) en.wonAt=null; });\n    if(!db.assetLinks){ db.assetLinks={ baseImages:'', hooks:'', bodies:'' }; }\n    if(!Array.isArray(db.platforms)||!db.platforms.length){ db.platforms=this.DEFAULT_PLATFORMS.map(p=>({...p})); }\n    else { db.platforms=db.platforms.map(p=>({ id:p.id, name:p.name||p.id, label:p.label||(p.name||p.id).slice(0,2).toUpperCase(), color:p.color||'#8b8b93' })); }\n    if(!db.slots||typeof db.slots!=='object'||Array.isArray(db.slots)){ db.slots={}; }\n    // normalize slots to new shape { id, prod, conceptId } (migrate old concept/custom blocks)\n    Object.keys(db.slots).forEach(ch=>{ const arr=db.slots[ch]; if(!Array.isArray(arr)){ db.slots[ch]=[]; i++){ const s=slots[i];\n          db.dailyEntries.push({ id:this.uid('de'), date, character:ch, conceptId:s.conceptId||'', conceptVarId:'', hookVarId:'', bodyVarId:'', hook:'', bodyText:'', type:'Product', prod:p, done:false, posted:false, platforms:[], videoLink:'', hookKind:'text', hookLink:'', bodyKind:'text', bodyLink:'', refVideo:'', notes:'', win:false, wonAt:null, createdAt:Date.now() }); } });\n    });\n  }\n  slotsVals(){\n    const db=this.state.db||{}; const T=this.todayStr();\n    const cById={}; (db.concepts||[]).forEach(c=>{ cById[c.id]=c; });\n    const conceptOpts=[{ id:'', name:'\\u2014 Any concept' }].concat((db.concepts||[]).map(c=>({ id:c.id, name:c.name })));\n    const accByChar={}; (db.accounts||[]).forEach(a=>{ if(!accByChar[a.character]) accByChar[a.character]=a; });\n    const canEdit=this.isAdmin();\n    const selStyle=(col)=>({ height:'30px', padding:'0 8px', background:'#0e0e11', border:'1px solid '+this.alpha(col,0.3), borderRadius:'8px', color:this.alpha(col,1), fontSize:'11.5px', fontWeight:'700', outline:'none', colorScheme:'dark', cursor:'pointer' });\n    const stepBtn=(disabled)=>({ width:'26px', height:'26px', flex:'0 0 auto', borderRadius:'7px', border:'1px solid rgba(255,255,255,0.12)', background:'transparent', color: disabled?'#3a3a40':'#cfd0d4', fontSize:'15px', fontWeight:'700', cursor: disabled?'default':'pointer', display:'flex', alignItems:'center', justifyContent:'center', lineHeight:'1' });\n    let openCreate=0, openPost=0;\n    const boards=this.distinctCharacters(db).map(ch=>{\n      const a=accByChar[ch]; const pr=a?this.productById(a.product):null;\n      const plan=(db.slots||{})[ch]||[]; const counts=this.slotPlanCounts(ch); const pg=this.slotProgress(ch,T);\n      openCreate+=pg.needCreate; openPost+=pg.needPost;\n      const steppers=this.PROD_TIERS.map(p=>{ const col=this.prodColor(p); const n=counts[p]||0; return {\n        prod:p, count:String(n), dotStyle:{ width:'9px', height:'9px', borderRadius:'3px', background:col, flex:'0 0 auto' },\n        chipStyle:{ display:'flex', alignItems:'center', gap:'8px', flex:'1', minWidth:'0', padding:'8px 9px', borderRadius:'11px', background:this.alpha(col,0.08), border:'1px solid '+this.alpha(col,n>0?0.3:0.14) },\n        labelStyle:{ flex:'1', minWidth:'0', fontSize:'11.5px', fontWeight:'700', color: n>0?this.alpha(col,1):'#8b8b93', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' },\n        countStyle:{ fontFamily:\"'JetBrains Mono',monospace\", fontSize:'13px', fontWeight:'700', color: n>0?'#f4f4f5':'#5e5e66', minWidth:'14px', textAlign:'center' },\n        incStyle:stepBtn(false), decStyle:stepBtn(n===0), decDisabled:n===0,\n        inc:()=>this.slotAdd(ch,p), dec:()=>{ if(n>0) this.slotRemoveLastOfProd(ch,p); } };\n      });\n      const slots=plan.map((s,i)=>{ const col=this.prodColor(s.prod); const c=cById[s.conceptId];\n        return { id:s.id, n:String(i+1), prod:s.prod, prodColor:col,\n          barStyle:{ width:'4px', alignSelf:'stretch', borderRadius:'3px', background:col, flex:'0 0 auto' },\n          numStyle:{ fontFamily:\"'JetBrains Mono',monospace\", fontSize:'11px', fontWeight:'700', color:'#5e5e66', width:'16px', flex:'0 0 auto', textAlign:'center' },\n          prodValue:s.prod, prodSelStyle:{ ...selStyle(col), flex:'0 0 auto', width:'104px' }, onProd:e=>this.slotSetProd(ch,s.id,e.target.value),\n          prodChipStyle:this.pillStyle(col), conceptName: c?c.name:'Any concept',\n          conceptValue:s.conceptId||'', conceptSelStyle:{ ...selStyle(this.C.gray), flex:'1', minWidth:'0', color:'#cfd0d4', fontWeight:'600', borderColor:'rgba(255,255,255,0.1)' }, onConcept:e=>this.slotSetConcept(ch,s.id,e.target.value),\n          remove:()=>this.slotRemove(ch,s.id) };\n      });\n      const planned=pg.planned; const madePct= planned?Math.round(pg.made/planned*100):0; const postedPct= planned?Math.round(pg.posted/planned*100):0;\n      const barSeg=(pct,color)=>({ position:'absolute', left:'0', top:'0', bottom:'0', width:pct+'%', background:color, borderRadius:'999px', transition:'width .2s' });\n      const need=(txt,col)=>({ display:'inline-flex', alignItems:'center', gap:'5px', padding:'3px 9px', borderRadius:'8px', fontSize:'11px', fontWeight:'700', color:col, background:this.alpha(col,0.12), border:'1px solid '+this.alpha(col,0.26) });\n      return { character:ch, initial:(ch||'?')[0], product:pr?pr.short:'\\u2014', avatarStyle:this.charAvatarStyle(ch,38),\n        canEdit, readonly:!canEdit, steppers, slots, hasSlots:plan.length>0, noSlots:plan.length===0,\n        countLabel:plan.length+' slot'+(plan.length===1?'':'s'),\n        countStyle:{ display:'inline-flex', alignItems:'center', height:'22px', padding:'0 10px', borderRadius:'999px', fontFamily:\"'JetBrains Mono',monospace\", fontSize:'11px', fontWeight:'700', flex:'0 0 auto', color:'#8b8b93', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.08)' },\n        hasPlan:planned>0, madeText:pg.made+'/'+planned+' made today', postedText:pg.posted+'/'+planned+' posted',\n        madeBarStyle:barSeg(madePct,this.alpha(this.C.amber,0.55)), postedBarStyle:barSeg(postedPct,this.C.green),\n        needCreate:pg.needCreate, needPost:pg.needPost, hasNeedCreate:pg.needCreate>0, hasNeedPost:pg.needPost>0,\n        allClear: planned>0 && pg.needCreate===0 && pg.needPost===0,\n        createStyle:need('',this.C.amber), postStyle:need('',this.C.blue), createLabel:pg.needCreate+' to create', postLabel:pg.needPost+' to post',\n        addSlot:()=>this.slotAdd(ch,'Assembly'), clearAll:()=>this.slotClear(ch),\n        prefill:()=>{ this.prefillFromSlots(ch,T); this.setState({ tab:'builder', builderChar:ch, builderDate:T, drillId:null, detailId:null }); },\n        openBuilder:()=>this.setState({ tab:'builder', builderChar:ch, builderDate:T, drillId:null, detailId:null }),\n        boardStyle:{ background:'linear-gradient(160deg,#16191b,#0d1110)', border:'1px solid '+(pg.needCreate>0||pg.needPost>0?'rgba(255,255,255,0.08)':(planned>0?'rgba(52,224,138,0.25)':'rgba(255,255,255,0.06)')), borderRadius:'16px', padding:'16px 16px 15px' } };\n    });\n    return { slotBoards:boards, slotHasBoards:boards.length>0, conceptOpts, slotProdOpts:this.PROD_TIERS, slotCanEdit:canEdit,\n      slotTodayLabel:this.fmtFull(T), slotOpenCreate:String(openCreate), slotOpenPost:String(openPost),\n      slotOpenTotal:openCreate+openPost, slotAllClear:(openCreate+openPost)===0, slotHasOpen:(openCreate+openPost)>0,\n      slotGoBuilder:()=>this.setState({ tab:'builder', builderDate:T, builderChar:null, drillId:null, detailId:null }) };\n  }\n  renderVals(){\n    const g=this.globalVals();\n    if(!this.state.ready || !this.loggedIn()) return g;\n    return { ...g, ...this.dashVals(), ...this.myWorkVals(), ...this.dailyVals(), ...this.builderVals(), ...this.assetsVals(), ...this.accountsVals(), ...this.analyticsVals(), ...this.logsVals(), ...this.settingsVals(), ...this.slotsVals(), ...this.modalVals() };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
